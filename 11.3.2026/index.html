<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <title>JS Game: Catch the Ball!</title>
    <style>
        body {
            font-family: monospace;
            text-align: center;
            background: #f0f0f0;
        }

        #game-area {
            width: 500px;
            height: 400px;
            border: 3px solid #333;
            margin: 20px auto;
            position: relative;
            background: white;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        #final-score {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            display: none; /* Hidden by default */
        }

        #ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            display: none;
            transition: transform 0.1s;
        }

        #ball:active {
            transform: scale(0.8);
        }

        .stats {
            font-weight: bold;
        }

        #start-btn {
            padding: 0.5rem;
            border: 2px solid #000;
            background-color: #fff;
            font-family: monospace;
            cursor: pointer;
            border-radius: 0;
        }

        #start-btn:focus {
            outline: 2px solid #000;
        }

        #start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            outline: none;
        }

        #start-btn:hover {
            outline: 2px dashed #000;
        }
    </style>
</head>

<body>
    <h1>Πιάσε τη Μπάλα!</h1>
    <div class="stats">Σκορ: <span id="score">0</span> | Χρόνος: <span id="timer">20</span>s</div>
    <div id="game-area">
        <div id="final-score"></div>
        <div id="ball"></div>
    </div>
    <button id="start-btn" onclick="startGame()">Έναρξη Παιχνιδιού</button>

    <script>
        let score = 0;
        let timeLeft = 20;
        let timerInterval;
        let ballMoveTimeout;
        const ball = document.getElementById('ball');
        const gameArea = document.getElementById('game-area');
        const scoreDisplay = document.getElementById('score');
        const finalScoreDisplay = document.getElementById('final-score');
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');

        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function getIntervalTime() {
            let interval = 2000 - (score * 60);
            if (interval < 800) {
                return 800;
            }
            return interval;
        }

        function moveBall() {
            const x = Math.floor(Math.random() * (gameArea.clientWidth - ball.clientWidth));
            const y = Math.floor(Math.random() * (gameArea.clientHeight - ball.clientHeight));

            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
            ball.style.display = 'block';
            ball.style.backgroundColor = getRandomColor();
        }

        function ballLoop() {
            if (timeLeft <= 0) return;
            moveBall();
            const intervalTime = getIntervalTime();
            ballMoveTimeout = setTimeout(ballLoop, intervalTime);
        }

        gameArea.addEventListener('click', () => {
            if (timeLeft > 0) {
                score -= 1;
                updateScore();
            }
        });

        ball.addEventListener('click', (event) => {
            event.stopPropagation();
            if (timeLeft > 0) {
                score += 2;
                updateScore();
                clearTimeout(ballMoveTimeout);
                ballLoop();
            }
        });

        function updateScore() {
            scoreDisplay.textContent = score;
        }

        function startGame() {
            score = 0;
            timeLeft = 20;
            updateScore();
            timerDisplay.textContent = timeLeft;
            startBtn.disabled = true;
            finalScoreDisplay.style.display = 'none';
            gameArea.style.backgroundColor = 'white'; // Game area is white during the game

            clearInterval(timerInterval);
            clearTimeout(ballMoveTimeout);

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    clearTimeout(ballMoveTimeout);
                    ball.style.display = 'none';
                    startBtn.disabled = false;
                    
                    finalScoreDisplay.textContent = score;
                    finalScoreDisplay.style.display = 'block';
                    
                    // Set final background color based on score
                    if (score < 0) {
                        gameArea.style.backgroundColor = 'lightcoral';
                    } else {
                        gameArea.style.backgroundColor = 'lightgreen';
                    }
                }
            }, 1000);
            
            ballLoop();
        }
    </script>
</body>

</html>
