<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            text-align: left;
        }
        .blue {
            background-color: blue;
            color: white;
            padding: 10px;
        }
        .red {
            background-color: red;
            color: white;
            padding: 10px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th class="blue">London</th>
        </tr>
        <tr>
            <td>London is the capital of England.</td>
        </tr>
        <tr>
            <th class="red">Cape Town</th>
        </tr>
        <tr>
            <td>Cape Town is the capital of South Africa.</td>
        </tr>
    </table>
</body>
</html>
