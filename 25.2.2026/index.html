<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <title>Τυχαίος Αριθμός</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f0f2f5;
        }

        #number {
            font-size: 100px;
            font-weight: bold;
            color: #007bff;
            margin: 20px;
            min-width: 100px;
            text-align: center;
            text-decoration: underline;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #218838;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div id="number">___</div>
    <button onclick="generateRandom()">Κλήρωση!</button>

    <script>
        const clicksound = new Audio('Click-01.mp3');

        function generateRandom() {
            const display = document.getElementById('number');
            let count = 0;

            // Εφέ "κυλιόμενων" αριθμών για 1 δευτερόλεπτο
            const interval = setInterval(() => {
                display.innerText = Math.floor(Math.random() * 999) + 1;
                clicksound.cloneNode().play();
                count++;

                if (count > 15) { // Σταματάει μετά από 15 αλλαγές
                    clearInterval(interval);

                    // Τελικός τυχαίος αριθμός
                    display.innerText = Math.floor(Math.random() * 999) + 1;
                }
            }, 50); // Ταχύτητα αλλαγής (50ms)
        }
    </script>

</body>

</html>
