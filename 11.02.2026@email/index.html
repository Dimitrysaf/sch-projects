<!DOCTYPE html>
<html>

<body>
    <h2>What Can JavaScript Do?</h2>
    <p>JavaScript can change HTML attribute values.</p>
    <p>In this case JavaScript changes the value of the src (source) attribute of an image.</p>
    <img id="myImage" src="without_money.png" style="width:500px">
    <button onclick="document.getElementById('myImage').src='with_money.png'">Πριν το 2010</button>
    <button onclick="document.getElementById('myImage').src='without_money.png'">Μέσα στα 2010 - 2015</button>
    <button onclick="document.getElementById('myImage').src='with_money.png'">Μετά το 2015</button>
</body>

</html>
