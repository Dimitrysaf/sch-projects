<!DOCTYPE html>
<html>

<body>
    <div>
        <button onclick="plus()">+</button>
        <button onclick="minus()">-</button>
        <button onclick="reset()">Reset</button>
        <button onclick="randomPic()">Random</button>
    </div>
    <br>
    <img id="myImage" src="without_money.png" style="width:500px">
</body>
<script>
    let size = 500;
    let pics = ["pic_bulboff.gif", "pic_bulbon.gif", "with_money.png", "without_money.png", "after.png", "before.png"];

    function plus() {
        size += 20;
        myImage.style.width = size + "px";
    }

    function minus() {
        size -= 20;
        myImage.style.width = size + "px";
    }

    function reset() {
        size = 500;
        myImage.style.width = size + "px";
    }

    function randomPic() {
        let random = Math.floor(Math.random() * pics.length);
        myImage.src = pics[random];
    }
</script>

</html>
