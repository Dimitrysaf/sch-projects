<!DOCTYPE html>
<html>

<body>
    <div>
        <button onclick="plus()">+</button>
        <button onclick="minus()">-</button>
        <button onclick="reset()">Reset</button>
        <button onclick="randomPic()">RandomPic</button>
    </div>
    <br>
    <img id="myImage" src="without_money.png" style="width:500px">
</body>
<script>
    let size = 500;
    let pic1 = "pic_bulboff.gif"
    let pic2 = "pic_bulbon.gif"
    let pic3 = "with_money.png"
    let pic4 = "without_money.png"
    let pic5 = "after.png"
    let pic6 = "before.png"

    function plus() {
        size += 20;
        myImage.style.width = size + "px";
    }

    function minus() {
        size -= 20;
        myImage.style.width = size + "px";
    }

    function reset() {
        size = 500;
        myImage.style.width = size + "px";
    }

    function randomPic() {
        let pics = [pic1, pic2, pic3, pic4, pic5, pic6];
        let randomIndex = Math.floor(Math.random() * pics.length);
        myImage.src = pics[randomIndex];
    }
</script>

</html>
