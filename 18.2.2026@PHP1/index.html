<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>

<body>
    <form id="form" action="result.php" method="post">
        <fieldset>
            <legend>Information</legend>
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname" placeholder="Maria">
            <br>
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" placeholder="Papa">
            <br>
            <label for="pass">Password:</label>
            <input type="password" id="pass" name="pass" maxlength="12" required>
            <br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="example@example.com">
        </fieldset>
        <fieldset>
            <legend>Title</legend>
            <label for="mr">Mr.</label>
            <input type="radio" id="mr" name="r_title" value="mr">
            <br>
            <label for="mrs">Mrs.</label>
            <input type="radio" id="mrs" name="r_title" value="mrs">
            <br>
            <label for="phd">Phd.</label>
            <input type="radio" id="phd" name="r_title" value="phd">
        </fieldset>
        <fieldset>
            <legend>Options</legend>
            <input type="checkbox" name="cookies" id="cookies">
            <label for="cookies">I accept the cookies</label>
            <br>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </fieldset>
    </form>
</body>

</html>
