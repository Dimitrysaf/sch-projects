<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>

<body>
    <form>
        <label for="fname">First Name:</label>
        <input type="text" for="fname" name="fname" placeholder="Maria">
        <br>
        <label for="lname">Last Name:</label>
        <input type="text" for="lname" name="lname" placeholder="Papa">
        <br>
        <label for="pass">Password:</label>
        <input type="password" for="pass" name="pass" maxlength="12" required>
        <br>
        <label for="email">Email:</label>
        <input type="email" for="email" name="email" placeholder="example@example.com">
        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
        <br>
    </form>
</body>

</html>
